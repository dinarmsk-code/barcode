<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Сканер штрихкодов + n8n</title>
    <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #272626;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #3d3d3d;
            border-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            padding: 24px 20px 32px;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 8px 0;
            color: #70e000;
        }
        .sub {
            color: #70e000;
            margin-bottom: 28px;
            border-left: 3px solid #ccff33;
            padding-left: 12px;
        }
        .barcode-field {
            margin: 20px 0;
        }
        label {
            font-weight: 600;
            color: #70e000;
            display: block;
            margin-bottom: 8px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            font-size: 1rem;
            border: 1px solid #9ef01a;
            border-radius: 24px;
            background: #272626;
            color: #70e000;
            transition: 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #ccff33;
            box-shadow: 0 0 0 3px rgba(204,255,51,0.2);
        }
        button {
            background: #ccff33;
            border: none;
            color: #3d3d3d;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        .btn-outline {
            background: transparent;
            border: 1px solid #9ef01a;
            color: #ccff33;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0 16px;
            flex-wrap: wrap;
        }
        .result {
            background: #3d3d3d;
            border-radius: 24px;
            padding: 16px;
            margin-top: 24px;
            font-size: 0.9rem;
            color: #70e000;
            border: 1px solid #ccff33;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .error {
            color: #b91c1c;
            background: #fee2e2;
            border-color: #fecaca;
        }
        .success {
            color: #3d3d3d;
            background: #38b000;
            border-color: #007200;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #3d3d3d;
            width: 90%;
            max-width: 480px;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 35px -10px black;
            color: #70e000;
        }
        .modal-content input {
            width: 100%;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #9ef01a;
            background: #272626;
            color: #70e000;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .video-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1100;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #interactive {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #interactive video,
        #interactive canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }
        .close-camera-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccff33;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1200;
            border: 1px solid #ccff33;
        }
        @media (max-width: 500px) {
            .close-camera-btn { width: 40px; height: 40px; font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📷 Сканер штрихкодов</h1>
    <div class="sub">Считайте код → найдите в БД или добавьте новый</div>

    <div class="barcode-field">
        <label>Штрихкод</label>
        <div class="input-group">
            <input type="text" id="barcodeInput" placeholder="Считайте или введите вручную" autocomplete="off">
            <button id="scanBtn" class="btn-outline">📷 Сканировать</button>
        </div>
    </div>

    <div class="action-buttons">
        <button id="searchBtn">🔍 Найти</button>
        <button id="addBtn" style="background:#70e000; color:#3d3d3d;">➕ Добавить</button>
    </div>

    <div id="resultBlock" class="result">
        ⚡ Результат появится после действия
    </div>
</div>

<!-- Модалка добавления -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>➕ Добавить товар</h3>
        <label>Штрихкод (основной)</label>
        <input type="text" id="addBarcode" readonly style="background:#3d3d3d; color:#70e000;">
        <label>Штрихкод коробки</label>
        <input type="text" id="addBoxBarcode" placeholder="Код коробки">
        <label>Название *</label>
        <input type="text" id="addName" placeholder="Например: Молоко">
        <label>Модель</label>
        <input type="text" id="addModel" placeholder="Модель / артикул">
        <label>Количество *</label>
        <input type="number" id="addQuantity" value="1">
        <div class="modal-buttons">
            <button id="modalCancel" class="btn-outline">Отмена</button>
            <button id="modalSubmit" style="background:#70e000; color:#3d3d3d;">Сохранить</button>
        </div>
    </div>
</div>

<!-- Видео-контейнер -->
<div id="cameraView" class="video-preview">
    <div id="interactive"></div>
    <div id="closeCameraBtn" class="close-camera-btn">✕</div>
</div>

<script>
    // === ЗАМЕНИТЕ НА ВАШИ URL ===
    const WEBHOOK_SEARCH = "https://din8n.ru/webhook-test/357fd427-59db-4b27-86c0-dbdd586e0dc6";
    const WEBHOOK_ADD = "https://ваш-сервер.com/webhook-add";

    const barcodeInput = document.getElementById('barcodeInput');
    const scanBtn = document.getElementById('scanBtn');
    const searchBtn = document.getElementById('searchBtn');
    const addBtn = document.getElementById('addBtn');
    const resultBlock = document.getElementById('resultBlock');
    const addModal = document.getElementById('addModal');
    const cameraDiv = document.getElementById('cameraView');

    let scannerActive = false;
    let lastScanTime = 0;

    function showMessage(text, isError = false, isSuccess = false) {
        resultBlock.textContent = text;
        resultBlock.classList.remove('error', 'success');
        if (isError) resultBlock.classList.add('error');
        else if (isSuccess) resultBlock.classList.add('success');
    }

    function formatSearchResult(data) {
        let lines = [];
        if (data["Штрихкод"]) lines.push(`Штрихкод: ${data["Штрихкод"]}`);
        if (data["Название товара"]) lines.push(`Название товара: ${data["Название товара"]}`);
        if (data["Артикул"]) lines.push(`Артикул: ${data["Артикул"]}`);
        if (data["Кол-во в коробке"] !== undefined) lines.push(`Кол-во в коробке: ${data["Кол-во в коробке"]}`);
        return lines.join('\n');
    }

    function stopCamera() {
        if (scannerActive) {
            Quagga.stop();
            scannerActive = false;
        }
        cameraDiv.style.display = 'none';
        const interactive = document.getElementById('interactive');
        if (interactive) interactive.innerHTML = '';
    }

    function startScanner() {
        if (scannerActive) {
            stopCamera();
            setTimeout(() => initQuagga(), 300);
        } else {
            initQuagga();
        }
    }

    // Расширенный фильтр: поддерживает EAN-13, EAN-8, Code128 (4-20 символов, макс 30% букв), короткие цифровые коды (4-8 цифр)
    function isValidBarcode(code) {
        if (!code) return false;
        // EAN-13: 13 цифр
        if (/^\d{13}$/.test(code)) return true;
        // EAN-8: 8 цифр
        if (/^\d{8}$/.test(code)) return true;
        // Code128: от 4 до 20 символов (цифры и буквы, но ограничим буквы)
        if (code.length >= 4 && code.length <= 20) {
            const alphaCount = (code.match(/[A-Za-z]/g) || []).length;
            if (alphaCount <= code.length * 0.3) return true;
        }
        // Дополнительно: любые цифровые коды от 4 до 8 символов (коробки)
        if (/^\d{4,8}$/.test(code)) return true;
        return false;
    }

    function initQuagga() {
        cameraDiv.style.display = 'flex';
        const targetDiv = document.getElementById('interactive');
        targetDiv.innerHTML = '';

        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: targetDiv,
                constraints: {
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                area: { top: "0%", right: "0%", left: "0%", bottom: "0%" }
            },
            decoder: {
                readers: ["code_128_reader", "ean_reader", "ean_8_reader", "code_39_reader"]
            },
            locate: true,
            numOfWorkers: 4,
            frequency: 10
        }, function(err) {
            if (err) {
                console.error(err);
                showMessage("Ошибка доступа к камере: " + err, true);
                stopCamera();
                return;
            }
            scannerActive = true;
            Quagga.start();
        });

        Quagga.onDetected(function(result) {
            if (!scannerActive) return;
            const now = Date.now();
            if (now - lastScanTime < 2000) return;
            const code = result.codeResult.code;
            if (!code) return;

            if (!isValidBarcode(code)) {
                console.log("Игнорируем мусорный код:", code);
                return;
            }

            lastScanTime = now;
            barcodeInput.value = code;
            showMessage(`✅ Считан код: ${code}`, false);
            stopCamera();
        });
    }

    // Поиск
    async function searchBarcode(barcode) {
        if (!barcode) { showMessage("Введите или считайте штрихкод", true); return; }
        showMessage("Поиск...", false);
        try {
            const response = await fetch(WEBHOOK_SEARCH, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ barcode: barcode })
            });
            const data = await response.json();
            if (data && data["Штрихкод"]) {
                showMessage(formatSearchResult(data), false);
            } else if (data.found === true) {
                let info = `Штрихкод: ${data.barcode || barcode}\n`;
                if (data.name) info += `Название: ${data.name}\n`;
                if (data.model) info += `Модель: ${data.model}\n`;
                if (data.quantity !== undefined) info += `Количество: ${data.quantity}`;
                showMessage(info, false);
            } else {
                showMessage(`❌ ${data.message || "Штрихкод не найден"}`, true);
            }
        } catch (err) {
            showMessage("Ошибка соединения. Проверьте CORS и адрес вебхука.", true);
        }
    }

    // Добавление
    async function addBarcodeToDB(payload) {
        try {
            const response = await fetch(WEBHOOK_ADD, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.success === true || (!data.error && data.success !== false)) {
                showMessage(`✅ Товар добавлен! Код: ${payload.barcode}`, false, true);
                barcodeInput.value = '';
                addModal.style.display = 'none';
                document.getElementById('addBoxBarcode').value = '';
                document.getElementById('addName').value = '';
                document.getElementById('addModel').value = '';
                document.getElementById('addQuantity').value = '1';
            } else {
                showMessage(`Ошибка: ${data.error || "неизвестная"}`, true);
            }
        } catch(err) {
            showMessage("Ошибка соединения при добавлении.", true);
        }
    }

    // Обработчики
    searchBtn.onclick = () => searchBarcode(barcodeInput.value.trim());
    addBtn.onclick = () => {
        const cur = barcodeInput.value.trim();
        if (!cur) { showMessage("Сначала считайте или введите штрихкод", true); return; }
        document.getElementById('addBarcode').value = cur;
        document.getElementById('addBoxBarcode').value = '';
        document.getElementById('addName').value = '';
        document.getElementById('addModel').value = '';
        document.getElementById('addQuantity').value = '1';
        addModal.style.display = 'flex';
    };
    document.getElementById('modalSubmit').onclick = () => {
        const b = document.getElementById('addBarcode').value.trim();
        const box = document.getElementById('addBoxBarcode').value.trim();
        const name = document.getElementById('addName').value.trim();
        const model = document.getElementById('addModel').value.trim();
        let qty = parseInt(document.getElementById('addQuantity').value, 10);
        if (isNaN(qty)) qty = 0;
        if (!b) { showMessage("Штрихкод обязателен", true); return; }
        if (!name) { showMessage("Название обязательно", true); return; }
        addBarcodeToDB({ barcode: b, box_barcode: box, name: name, model: model, quantity: qty });
    };
    document.getElementById('modalCancel').onclick = () => addModal.style.display = 'none';
    addModal.addEventListener('click', (e) => { if (e.target === addModal) addModal.style.display = 'none'; });
    scanBtn.onclick = () => startScanner();
    document.getElementById('closeCameraBtn').onclick = () => stopCamera();

    window.addEventListener('load', () => {
        barcodeInput.value = '';
        showMessage("Готов. Нажмите «Сканировать»", false);
    });
</script>
</body>
</html>
