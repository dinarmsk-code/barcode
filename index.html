<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Сканер штрихкодов + n8n</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f7fb;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            padding: 24px 20px 32px;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 8px 0;
            color: #1e293b;
        }
        .sub {
            color: #475569;
            margin-bottom: 28px;
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
        }
        .barcode-field {
            margin: 20px 0;
        }
        label {
            font-weight: 600;
            color: #0f172a;
            display: block;
            margin-bottom: 8px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            font-size: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 24px;
            background: white;
            transition: 0.2s;
        }
        button {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        .btn-outline {
            background: white;
            border: 1px solid #cbd5e1;
            color: #1e293b;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0 16px;
            flex-wrap: wrap;
        }
        .result {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 16px;
            margin-top: 24px;
            font-size: 0.9rem;
            color: #0f172a;
            border: 1px solid #e2e8f0;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .error { color: #b91c1c; background: #fee2e2; border-color: #fecaca; }
        .success { color: #166534; background: #dcfce7; border-color: #bbf7d0; }
        
        /* Модалки */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 480px;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 35px -10px black;
        }
        .modal-content input {
            width: 100%;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #ccc;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        /* Видео на весь экран с contain */
        .video-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #scanner-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }
        .close-camera-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1200;
            border: 1px solid rgba(255,255,255,0.3);
        }
        @media (max-width: 500px) {
            .close-camera-btn { width: 40px; height: 40px; font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📷 Сканер штрихкодов</h1>
    <div class="sub">Считайте код → найдите в БД или добавьте новый</div>

    <div class="barcode-field">
        <label>Штрихкод</label>
        <div class="input-group">
            <input type="text" id="barcodeInput" placeholder="Считайте или введите вручную" autocomplete="off">
            <button id="scanBtn" class="btn-outline">📷 Сканировать</button>
        </div>
    </div>

    <div class="action-buttons">
        <button id="searchBtn">🔍 Найти</button>
        <button id="addBtn" style="background:#10b981;">➕ Добавить</button>
    </div>

    <div id="resultBlock" class="result">
        ⚡ Результат появится после действия
    </div>
</div>

<!-- Модалка добавления -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>➕ Добавить товар</h3>
        <label>Штрихкод (основной)</label>
        <input type="text" id="addBarcode" readonly style="background:#f1f5f9;">
        <label>Штрихкод коробки</label>
        <input type="text" id="addBoxBarcode" placeholder="Код коробки">
        <label>Название *</label>
        <input type="text" id="addName" placeholder="Например: Молоко">
        <label>Модель</label>
        <input type="text" id="addModel" placeholder="Модель / артикул">
        <label>Количество *</label>
        <input type="number" id="addQuantity" value="1">
        <div class="modal-buttons">
            <button id="modalCancel" class="btn-outline">Отмена</button>
            <button id="modalSubmit" style="background:#10b981;">Сохранить</button>
        </div>
    </div>
</div>

<!-- Модалка подтверждения сканирования -->
<div id="confirmModal" class="modal">
    <div class="modal-content">
        <h3>📸 Подтверждение кода</h3>
        <p>Считан код:</p>
        <p id="pendingCode" style="font-weight: bold; font-size: 1.2rem;"></p>
        <div class="modal-buttons">
            <button id="rejectBtn" class="btn-outline">❌ Отменить</button>
            <button id="acceptBtn" style="background:#3b82f6;">✅ Использовать</button>
        </div>
    </div>
</div>

<!-- Видео-контейнер -->
<div id="cameraView" class="video-preview">
    <video id="scanner-video" autoplay playsinline></video>
    <div id="closeCameraBtn" class="close-camera-btn">✕</div>
</div>

<script>
    // === НАСТРОЙКИ (ЗАМЕНИТЕ НА ВАШИ URL) ===
    const WEBHOOK_SEARCH = "https://ваш-сервер.com/webhook-search";
    const WEBHOOK_ADD = "https://ваш-сервер.com/webhook-add";

    // DOM элементы
    const barcodeInput = document.getElementById('barcodeInput');
    const scanBtn = document.getElementById('scanBtn');
    const searchBtn = document.getElementById('searchBtn');
    const addBtn = document.getElementById('addBtn');
    const resultBlock = document.getElementById('resultBlock');
    const addModal = document.getElementById('addModal');
    const cameraDiv = document.getElementById('cameraView');
    const confirmModal = document.getElementById('confirmModal');
    const pendingCodeSpan = document.getElementById('pendingCode');
    const video = document.getElementById('scanner-video');

    let stream = null;
    let barcodeDetector = null;
    let scanningActive = false;
    let currentPendingCode = null;

    // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
    function showMessage(text, isError = false, isSuccess = false) {
        resultBlock.textContent = text;
        resultBlock.classList.remove('error', 'success');
        if (isError) resultBlock.classList.add('error');
        else if (isSuccess) resultBlock.classList.add('success');
    }

    function formatSearchResult(data) {
        // data содержит русские ключи: Штрихкод, Название товара, Артикул, Кол-во в коробке
        let lines = [];
        if (data["Штрихкод"]) lines.push(`Штрихкод: ${data["Штрихкод"]}`);
        if (data["Название товара"]) lines.push(`Название товара: ${data["Название товара"]}`);
        if (data["Артикул"]) lines.push(`Артикул: ${data["Артикул"]}`);
        if (data["Кол-во в коробке"] !== undefined) lines.push(`Кол-во в коробке: ${data["Кол-во в коробке"]}`);
        return lines.join('\n');
    }

    // === ОСТАНОВКА КАМЕРЫ ===
    async function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        scanningActive = false;
        cameraDiv.style.display = 'none';
        video.srcObject = null;
        if (barcodeDetector) {
            // отключаем детектор, он продолжит попытки, но видео уже нет
        }
    }

    // === ЗАПУСК СКАНЕРА С СОВРЕМЕННЫМ API ===
    async function startScanner() {
        if (scanningActive) {
            await stopCamera();
            // небольшой таймаут перед повторным запуском
            setTimeout(() => initScanner(), 300);
        } else {
            await initScanner();
        }
    }

    async function initScanner() {
        // Проверяем поддержку BarcodeDetector
        if (!('BarcodeDetector' in window)) {
            showMessage("Ваш браузер не поддерживает сканирование штрихкодов. Обновите Chrome/Edge/Safari.", true);
            return;
        }
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            // Предпочитаем заднюю камеру
            let backCamera = videoDevices.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('rear'));
            const cameraId = backCamera ? backCamera.deviceId : videoDevices[0]?.deviceId;
            
            stream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: cameraId ? { exact: cameraId } : undefined, facingMode: 'environment' }
            });
            video.srcObject = stream;
            await video.play();
            cameraDiv.style.display = 'flex';
            scanningActive = true;

            // Создаём детектор
            barcodeDetector = new BarcodeDetector({ formats: ['ean_13', 'code_128', 'ean_8', 'code_39', 'qr_code'] });
            requestAnimationFrame(scanFrame);
        } catch (err) {
            console.error(err);
            showMessage("Ошибка доступа к камере: " + err.message, true);
            stopCamera();
        }
    }

    async function scanFrame() {
        if (!scanningActive || !video.videoWidth) {
            if (scanningActive) requestAnimationFrame(scanFrame);
            return;
        }
        try {
            const barcodes = await barcodeDetector.detect(video);
            if (barcodes.length > 0) {
                const code = barcodes[0].rawValue;
                if (code && code !== currentPendingCode) {
                    // Найден код – останавливаем распознавание и показываем модалку
                    scanningActive = false;
                    currentPendingCode = code;
                    pendingCodeSpan.textContent = code;
                    confirmModal.style.display = 'flex';
                    // Приостанавливаем видео? Нет, пусть висит, но детектор больше не вызываем, пока не закроют модалку.
                    return;
                }
            }
        } catch(e) { console.warn(e); }
        if (scanningActive) requestAnimationFrame(scanFrame);
    }

    // Подтверждение кода
    document.getElementById('acceptBtn').onclick = () => {
        if (currentPendingCode) {
            barcodeInput.value = currentPendingCode;
            showMessage(`✅ Считан код: ${currentPendingCode}`, false);
        }
        confirmModal.style.display = 'none';
        currentPendingCode = null;
        stopCamera();
    };
    document.getElementById('rejectBtn').onclick = () => {
        confirmModal.style.display = 'none';
        currentPendingCode = null;
        // Перезапускаем сканирование (оставляем камеру открытой)
        if (stream && !scanningActive) {
            scanningActive = true;
            requestAnimationFrame(scanFrame);
        } else if (!stream) {
            startScanner();
        }
    };
    // Закрытие модалки по клику вне
    confirmModal.addEventListener('click', (e) => {
        if (e.target === confirmModal) {
            confirmModal.style.display = 'none';
            currentPendingCode = null;
            if (stream && !scanningActive) {
                scanningActive = true;
                requestAnimationFrame(scanFrame);
            }
        }
    });

    // === ПОИСК ===
    async function searchBarcode(barcode) {
        if (!barcode) { showMessage("Введите или считайте штрихкод", true); return; }
        showMessage("Поиск...", false);
        try {
            const response = await fetch(WEBHOOK_SEARCH, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ barcode: barcode })
            });
            const data = await response.json();
            if (data && data["Штрихкод"]) {
                const formatted = formatSearchResult(data);
                showMessage(formatted, false);
            } else if (data.found === true) {
                // fallback на латиницу
                let info = `Штрихкод: ${data.barcode || barcode}\n`;
                if (data.name) info += `Название: ${data.name}\n`;
                if (data.model) info += `Модель: ${data.model}\n`;
                if (data.quantity !== undefined) info += `Количество: ${data.quantity}`;
                showMessage(info, false);
            } else {
                showMessage(`❌ ${data.message || "Штрихкод не найден"}`, true);
            }
        } catch (err) {
            showMessage("Ошибка соединения. Проверьте CORS и адрес вебхука.", true);
        }
    }

    // === ДОБАВЛЕНИЕ ===
    async function addBarcodeToDB(payload) {
        try {
            const response = await fetch(WEBHOOK_ADD, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.success === true || (!data.error && data.success !== false)) {
                showMessage(`✅ Товар добавлен! Код: ${payload.barcode}`, false, true);
                barcodeInput.value = '';
                addModal.style.display = 'none';
                document.getElementById('addBoxBarcode').value = '';
                document.getElementById('addName').value = '';
                document.getElementById('addModel').value = '';
                document.getElementById('addQuantity').value = '1';
            } else {
                showMessage(`Ошибка: ${data.error || "неизвестная"}`, true);
            }
        } catch(err) {
            showMessage("Ошибка соединения при добавлении.", true);
        }
    }

    // === ОБРАБОТЧИКИ КНОПОК ===
    searchBtn.onclick = () => searchBarcode(barcodeInput.value.trim());
    addBtn.onclick = () => {
        const cur = barcodeInput.value.trim();
        if (!cur) { showMessage("Сначала считайте или введите штрихкод", true); return; }
        document.getElementById('addBarcode').value = cur;
        document.getElementById('addBoxBarcode').value = '';
        document.getElementById('addName').value = '';
        document.getElementById('addModel').value = '';
        document.getElementById('addQuantity').value = '1';
        addModal.style.display = 'flex';
    };
    document.getElementById('modalSubmit').onclick = () => {
        const b = document.getElementById('addBarcode').value.trim();
        const box = document.getElementById('addBoxBarcode').value.trim();
        const name = document.getElementById('addName').value.trim();
        const model = document.getElementById('addModel').value.trim();
        let qty = parseInt(document.getElementById('addQuantity').value, 10);
        if (isNaN(qty)) qty = 0;
        if (!b) { showMessage("Штрихкод обязателен", true); return; }
        if (!name) { showMessage("Название обязательно", true); return; }
        addBarcodeToDB({ barcode: b, box_barcode: box, name: name, model: model, quantity: qty });
    };
    document.getElementById('modalCancel').onclick = () => addModal.style.display = 'none';
    addModal.addEventListener('click', (e) => { if (e.target === addModal) addModal.style.display = 'none'; });
    scanBtn.onclick = () => startScanner();
    document.getElementById('closeCameraBtn').onclick = () => stopCamera();

    window.addEventListener('load', () => {
        barcodeInput.value = '';
        showMessage("Готов. Нажмите «Сканировать»", false);
    });
</script>
</body>
</html>
